<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หน้าแนะนำตัวของปฐภรณ์</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:10px;
    overflow:hidden;
    font-family:sans-serif;
    color:#333;
    background:linear-gradient(-45deg,#e3f2fd,#bbdefb,#fce4ec,#e1f5fe);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* ===== เอฟเฟกต์ดาว ===== */
.sparkles{
    position:fixed;
    inset:0;
    pointer-events:none;
}

.sparkles span{
    position:absolute;
    bottom:-30px;
    color:rgba(255,255,255,.9);
    font-size:20px;
    animation:floatStar linear infinite;
}

.sparkles span:nth-child(1){left:10%;animation-duration:10s}
.sparkles span:nth-child(2){left:25%;animation-duration:12s}
.sparkles span:nth-child(3){left:40%;animation-duration:8s}
.sparkles span:nth-child(4){left:60%;animation-duration:14s}
.sparkles span:nth-child(5){left:75%;animation-duration:9s}
.sparkles span:nth-child(6){left:90%;animation-duration:11s}

@keyframes floatStar{
    0%{transform:translateY(0) rotate(0deg);opacity:0}
    20%{opacity:1}
    100%{transform:translateY(-120vh) rotate(360deg);opacity:0}
}

/* ===== การ์ดหลัก ===== */
.card{
    width:100%;
    max-width:400px;
    padding:20px;
    text-align:center;
    border-radius:20px;
    background:rgba(255,255,255,.95);
    box-shadow:0 15px 35px rgba(0,0,0,.15);
    position:relative;
    overflow:visible;
    z-index:10;
    animation:cardFloat 4s ease-in-out infinite;
    transition:.5s;
}

@keyframes cardFloat{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-10px)}
}

/* แบบ B: การ์ดขยับนิดเดียว */
.card:hover{
    transform:translateX(-25px);
}

/* แสงวิ่งบนการ์ด */
.card::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:20px;
    background:linear-gradient(
        120deg,
        transparent 35%,
        rgba(255,255,255,.5) 50%,
        transparent 65%
    );
    z-index:0;
    pointer-events:none;
    transform:translateX(-130%);
    animation:shine 8s linear infinite;
}

@keyframes shine{
    from{transform:translateX(-130%)}
    to{transform:translateX(230%)}
}

/* ===== เนื้อหาการ์ดต้องอยู่บนสุด ===== */
.card-header,
h1,p{
    position:relative;
    z-index:2;
}

/* รูป */
.card-header{
    height:120px;
    margin-bottom:25px;
    border-radius:15px;
    overflow:hidden;
}

.card-header img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* ตัวหนังสือ */
h1{
    color:#1565c0;
    font-size:24px;
    margin-bottom:15px;
}

p{
    font-size:16px;
    line-height:1.5;
    margin:10px 0;
}

/* ===== เมนู (ซ่อนอยู่หลังการ์ด) ===== */
.slide-menu{
    position:absolute;
    top:10px;
    left:100%;
    width:240px;

    display:flex;
    flex-direction:column;
    gap:12px;

    z-index:1;
}

/* กล่องเมนู */
.menu{
    padding:14px 16px;
    border-radius:16px;

    text-decoration:none;
    color:white;
    font-weight:bold;

    box-shadow:0 10px 25px rgba(0,0,0,.15);

    opacity:0;
    transform:translateX(-220px);

    transition:.6s ease;
}

/* hover แล้วค่อยโผล่ */
.card:hover .menu{
    opacity:1;
    transform:translateX(0);
}

/* ไล่ทีละอัน */
.card:hover .item1{transition-delay:0s}
.card:hover .item2{transition-delay:.08s}
.card:hover .item3{transition-delay:.16s}
.card:hover .item4{transition-delay:.24s}

/* ===== สีพาสเทลแบบสวยขึ้น ===== */
.item1{
    background:linear-gradient(135deg,#64b5f6,#bbdefb);
}

.item2{
    background:linear-gradient(135deg,#9575cd,#d1c4e9);
}

.item3{
    background:linear-gradient(135deg,#f48fb1,#f8bbd0);
}

.item4{
    background:linear-gradient(135deg,#4dd0e1,#b2ebf2);
}

/* hover เมนู */
.menu:hover{
    transform:translateX(10px);
}
</style>
</head>

<body>

<div class="sparkles">
    <span>✨</span>
    <span>✦</span>
    <span>✨</span>
    <span>✦</span>
    <span>✨</span>
    <span>✦</span>
</div>

<div class="card">

    <div class="card-header">
        <img src="https://i.postimg.cc/9QbP25sP/albrecht-durer-view-of-trente-1494.jpg" alt="profile">
    </div>

    <h1>ยินดีต้อนรับสู่โปรไฟล์ของปฐภรณ์</h1>

    <p>ขณะนี้กำลังศึกษาและสนใจด้านการวาดรูปและงานศิลปะหลากแบบ</p>

    <p>นี่คือเว็บไซต์แรกของฉันที่โฮสต์บน GitHub Pages</p>

    <!-- เมนู -->
    <div class="slide-menu">

        <a href="personal.html" class="menu item1">
            👤 ประวัติส่วนตัว
        </a>

        <a href="activity.html" class="menu item2">
            🏆 ผลงานด้านกิจกรรม
        </a>

        <a href="artwork.html" class="menu item3">
            🎨 ผลงานด้านศิลปะ
        </a>

        <a href="reason.html" class="menu item4">
            🎓 เหตุผลที่อยากเข้ามหาวิทยาลัยนี้
        </a>

    </div>

</div>

</body>
</html>
