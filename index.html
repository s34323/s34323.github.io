<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>หน้าแนะนำตัวของฉัน</title>
    <style>
        body {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: sans-serif;
            color: #333;
        }
        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
            padding: 40px;
            text-align: center;
        }
        h1 { color: #1565c0; margin-bottom: 20px; }
        p { font-size: 18px; line-height: 1.6; }
        
        .btn {
            display: inline-block;
            background: #1565c0;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 25px;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #0d47a1;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>ยินดีต้อนรับสู่โปรไฟล์ของฉัน</h1>
        <p>สวัสดีค่ะ ดิฉันชื่อ <strong>ปฐภรณ์ (Pataporn)</strong></p>
        <p>ขณะนี้กำลังศึกษาและสนใจด้าน Computer Science & Engineering ค่ะ</p>
        <p>นี่คือเว็บไซต์แรกของดิฉันที่โฮสต์บน GitHub Pages</p>
        
        <a href="portfolio.html" class="btn">ดูแฟ้มสะสมงานของดิฉัน</a>
    </div>

</body>
</html>
