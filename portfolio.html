<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แฟ้มสะสมงานของปฐภรณ์</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #e3f2fd; 
            text-align: center; 
            padding: 30px; 
            color: #444;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .project-card { 
            background: white; 
            padding: 25px; 
            margin: 20px 0; 
            border-radius: 15px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.05); 
            text-align: left; 
        }
        h1 { color: #1565c0; }
        h3 { color: #1976d2; margin-top: 0; }
        .btn { 
            display: inline-block; 
            background: #3498db; 
            color: white; 
            padding: 10px 25px; 
            text-decoration: none; 
            border-radius: 50px; 
            margin-top: 20px; 
            transition: background 0.3s;
        }
        .btn:hover { background: #2980b9; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎨 แฟ้มสะสมงานของปฐภรณ์</h1>
        <img src="mi-picture.jpg" alt="รูปโปรไฟล์ของฉัน" width="200">
        <p>พื้นที่รวบรวมผลงานภาพวาดและความภูมิใจของฉันค่ะ</p>

        <div class="project-card">
            <h3>ผลงานภาพวาดที่ 1</h3>
            <p>อธิบายรายละเอียดเกี่ยวกับภาพวาด แนวคิด หรือเทคนิคที่ใช้ในการสร้างสรรค์ผลงานชิ้นนี้ค่ะ</p>
        </div>

        <div class="project-card">
            <h3>กิจกรรมและการประกวด</h3>
            <p>รวมรวมประสบการณ์การเข้าร่วมกิจกรรมทางศิลปะ หรือการประกวดวาดภาพที่เคยได้รับค่ะ</p>
        </div>

        <a href="index.html" class="btn"> กลับหน้าแรก</a>
    </div>

</body>
</html>
